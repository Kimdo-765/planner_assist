name: Build APK & Publish Release

on:
  push:
    tags:
      - 'v*'           # v1.0.0 같은 태그를 푸시하면 자동 실행
  workflow_dispatch:
    inputs:
      version:
        description: '버전 (예: 1.0.0). 비우면 워크플로 run number 사용'
        required: false
        default: ''

permissions:
  contents: write       # Release 생성·자산 업로드용

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 버전 결정
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="0.0.${{ github.run_number }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # appVersionCode = vMAJOR*10000 + MINOR*100 + PATCH
          CODE=$(echo "$V" | awk -F. '{printf "%d", ($1*10000)+($2*100)+$3}')
          echo "version_code=$CODE" >> "$GITHUB_OUTPUT"
          echo "→ version=$V code=$CODE"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: 단위 테스트 (계산/URL 빌더)
        run: node scripts/test_logic.js

      - name: Bubblewrap CLI 설치
        run: npm install -g @bubblewrap/cli

      - name: Bubblewrap config 사전 설정 (인터랙티브 프롬프트 우회)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF
          cat ~/.bubblewrap/config.json

      - name: PWA dist 빌드 (bubblewrap fetch 대상)
        run: bash scripts/build.sh

      - name: 임시 HTTP 서버 시작 (포트 80, host=localhost)
        run: |
          # bubblewrap inquirer 가 'host:port' 형식을 invalid hostname 으로 거부.
          # 80 포트로 띄워 host=localhost (포트 미포함) 가 되도록.
          sudo nohup python3 -m http.server 80 --bind 127.0.0.1 --directory "$PWD/dist" \
            > /tmp/http.log 2>&1 &
          for i in 1 2 3 4 5; do
            sleep 1
            if curl -fsS http://localhost/manifest.webmanifest -o /dev/null; then
              echo "→ 임시 서버 OK"
              break
            fi
          done
          curl -fsS http://localhost/manifest.webmanifest | head -20

      - name: GitHub Secrets 에서 keystore 복원
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret 이 비어 있습니다. README 의 Release APK 섹션 참고."
            exit 1
          fi
          echo "$KS_B64" | base64 -d > android.keystore
          ls -la android.keystore
          # 무결성 체크: PKCS12 magic = 30 82
          head -c2 android.keystore | xxd

      - name: Bubblewrap 프로젝트 생성 (임시 HTTP 서버 fetch)
        run: |
          # bubblewrap 1.24 는 manifest 인자가 http(s) URL 이어야 함 + TWA 전용
          # 필드 미설정 시 보충 질문을 띄움. 모든 default 를 받아들이는 빈 줄
          # 시퀀스를 stdin 으로 공급. 결과 매니페스트는 다음 step 에서 patch.
          mkdir -p ./android
          (for i in $(seq 1 60); do echo; done) | bubblewrap init \
            --manifest=http://localhost/manifest.webmanifest \
            --directory="$PWD/android" \
            --skipPwaValidation
        env:
          CI: 'true'

      - name: 생성된 매니페스트를 GitHub Pages 호스트로 patch
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          # bubblewrap 이 생성한 매니페스트 (디렉토리 내 어딘가의 twa-manifest.json)
          candidates = list(pathlib.Path('android').rglob('twa-manifest.json'))
          if not candidates:
              raise SystemExit("init 결과의 twa-manifest.json 을 찾지 못함")
          gen = candidates[0]
          print(f"→ generated: {gen}")
          src = json.loads(pathlib.Path('twa-manifest.json').read_text())
          m = json.loads(gen.read_text())
          # 우리가 원하는 TWA 식별/도메인/외관 값으로 덮어쓰기
          override_keys = [
              'packageId', 'host', 'name', 'launcherName',
              'startUrl', 'iconUrl', 'maskableIconUrl', 'fullScopeUrl',
              'themeColor', 'navigationColor', 'navigationColorDark',
              'navigationDividerColor', 'navigationDividerColorDark',
              'backgroundColor', 'display', 'orientation',
              'enableNotifications', 'enableSiteSettingsShortcut',
              'minSdkVersion', 'fallbackType',
          ]
          for k in override_keys:
              if k in src:
                  m[k] = src[k]
          m['appVersion'] = os.environ['APP_VERSION']
          m['appVersionCode'] = int(os.environ['APP_VERSION_CODE'])
          m['signingKey'] = {
              'path': os.path.abspath('android.keystore'),
              'alias': 'android',
          }
          gen.write_text(json.dumps(m, indent=2, ensure_ascii=False))
          print(json.dumps(m, indent=2, ensure_ascii=False))
          PY
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          APP_VERSION_CODE: ${{ steps.ver.outputs.version_code }}

      - name: 임시 HTTP 서버 종료
        if: always()
        run: sudo pkill -f "http.server 80" 2>/dev/null || true

      - name: 매니페스트 패치 반영 — Android 리소스 재생성
        run: |
          cd android
          # update 는 patched twa-manifest.json 으로 AndroidManifest.xml 등을 다시 만듦
          bubblewrap update --skipVersionUpgrade < /dev/null
        env:
          CI: 'true'

      - name: Bubblewrap 빌드 (서명 포함)
        env:
          STOREPASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEYPASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          # bubblewrap build 는 비밀번호를 stdin 으로 받음 (storepass\nkeypass\n 순)
          printf '%s\n%s\n' "$STOREPASS" "$KEYPASS" | bubblewrap build --skipPwaValidation

      - name: 산출물 정리
        id: artifacts
        run: |
          V="${{ steps.ver.outputs.version }}"
          mkdir -p out
          # bubblewrap 산출물 위치 (버전마다 약간 다를 수 있어 find 로 수집)
          APK=$(find android -maxdepth 3 -name 'app-release-signed.apk' -print -quit)
          AAB=$(find android -maxdepth 4 -name '*release*.aab' -print -quit)
          if [ -z "$APK" ]; then
            echo "::error::빌드된 APK 를 찾지 못했습니다."
            ls -R android | head -100
            exit 1
          fi
          cp "$APK" "out/planner-assist-${V}.apk"
          if [ -n "$AAB" ]; then cp "$AAB" "out/planner-assist-${V}.aab"; fi
          # 무결성 해시
          (cd out && sha256sum *.apk *.aab 2>/dev/null > SHA256SUMS.txt || true)
          ls -la out
          echo "apk_path=out/planner-assist-${V}.apk" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: planner-assist-${{ steps.ver.outputs.version }}
          path: out/

      - name: GitHub Release 생성 & 자산 업로드
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 해외 출장 플래너 ${{ github.ref_name }}

            ### 설치
            - **Android (APK 사이드로딩)**: `planner-assist-*.apk` 다운로드 → 단말에 옮기고 탭하여 설치 ("출처 알 수 없는 앱" 허용 필요)
            - **PWA**: https://kimdo-765.github.io/planner_assist/ 를 Android Chrome 으로 열고 "홈 화면에 추가"
            - **Play 스토어**: `planner-assist-*.aab` 를 Play Console 에 업로드

            ### 무결성
            `SHA256SUMS.txt` 로 다운로드 파일 검증 가능.
          files: |
            out/planner-assist-*.apk
            out/planner-assist-*.aab
            out/SHA256SUMS.txt
